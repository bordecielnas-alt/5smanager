map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    ~.+    $http_x_forwarded_proto;
}

map $http_x_forwarded_host $fwd_host {
    default $host;
    ~.+    $http_x_forwarded_host;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Toutes les routes (pages, assets, server functions) proxifiées vers le SSR node.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $fwd_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host  $fwd_host;
        proxy_set_header X-Forwarded-Ssl   $https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 300s;
    }
}
