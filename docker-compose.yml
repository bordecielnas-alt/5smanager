services:
  5sproject:
    # Pour utiliser l'image pré-construite par GitHub Actions :
    # image: ghcr.io/bordecielnas-alt/5sproject-dev:latest
    build:
      context: .
      args:
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
        VITE_SUPABASE_PUBLISHABLE_KEY: "${VITE_SUPABASE_PUBLISHABLE_KEY}"
        VITE_SUPABASE_PROJECT_ID: "${VITE_SUPABASE_PROJECT_ID}"
    container_name: 5sproject
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      TZ: "${TZ:-Europe/Paris}"
      TRUST_PROXY_HTTPS: "${TRUST_PROXY_HTTPS:-0}"
    volumes:
      # Synchronise l'heure système du conteneur avec celle de l'hôte.
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # Volume persistant (logs, exports, cache applicatif).
      - ${DATA_DIR:-/mnt/user/appdata/5sproject}:/data
